<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>扫雷</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <div id="mine-counter" class="led">010</div>
      <button id="face-button">🙂</button>
      <div id="timer" class="led">000</div>
      <div class="sep"></div>
      <div id="controls">
        <button class="diff-btn active" data-level="beginner">初级</button>
        <button class="diff-btn" data-level="intermediate">中级</button>
        <button class="diff-btn" data-level="expert">高级</button>
      </div>
    </div>
    <div id="board"></div>
    <div id="pause-overlay">
      <div id="pause-text">⏸ 已暂停</div>
    </div>
  </div>

  <script src="game.js"></script>
  <script src="audio.js"></script>
  <script src="stats.js"></script>
  <script src="keybindings.js"></script>
  <script src="ui.js"></script>
  <script>
    const game = new GameEngine()
    const audio = new AudioManager()
    const stats = new StatsManager()
    const bindings = new KeyBindings()
    const ui = new UIRenderer(game, audio, stats)
    let timerInterval = null

    function startTimer() {
      if (timerInterval) return
      timerInterval = setInterval(() => {
        if (game.state === 'playing') {
          game.timer++
          if (game.timer > 999) game.timer = 999
          document.getElementById('timer').textContent = String(game.timer).padStart(3, '0')
        }
      }, 1000)
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval)
        timerInterval = null
      }
    }

    function fitWindow() {
      if (!window.electronAPI) return
      const pad = 40
      const boardW = game.cols * 28 + pad
      const boardH = game.rows * 28 + 120
      window.electronAPI.resize(
        Math.max(350, Math.min(1200, boardW)),
        Math.max(300, Math.min(900, boardH))
      )
    }

    function resetGame(level) {
      game.init(level)
      stopTimer()
      ui.render()
      ui.prevState = 'ready'
      if (window.electronAPI) window.electronAPI.updateMenuDifficulty(level)
      setTimeout(fitWindow, 50)
    }

    function showCustomDialog() {
      const overlay = document.createElement('div')
      overlay.className = 'dialog-overlay'
      overlay.innerHTML = `
        <div class="dialog">
          <h2>自定义雷区</h2>
          <div class="row">
            <label>行:</label>
            <input type="number" id="custom-rows" value="16" min="9" max="50">
          </div>
          <div class="row">
            <label>列:</label>
            <input type="number" id="custom-cols" value="16" min="9" max="50">
          </div>
          <div class="row">
            <label>雷数:</label>
            <input type="number" id="custom-mines" value="40" min="1">
          </div>
          <div class="actions">
            <button class="btn" id="custom-ok">确定</button>
            <button class="btn" id="custom-cancel">取消</button>
          </div>
        </div>
      `
      document.body.appendChild(overlay)

      overlay.querySelector('#custom-ok').addEventListener('click', () => {
        const rows = parseInt(overlay.querySelector('#custom-rows').value)
        const cols = parseInt(overlay.querySelector('#custom-cols').value)
        const mines = parseInt(overlay.querySelector('#custom-mines').value)
        const maxMines = Math.floor(rows * cols * 0.85)

        if (rows < 9 || cols < 9) {
          alert('行和列不能小于 9')
          return
        }
        if (rows > 50 || cols > 50) {
          alert('行和列不能大于 50')
          return
        }
        if (mines < 1 || mines > maxMines) {
          alert('雷数必须在 1 到 ' + maxMines + ' 之间')
          return
        }

        document.body.removeChild(overlay)
        game.initCustom(rows, cols, mines)
        stopTimer()
        ui.render()
        ui.prevState = 'ready'
        if (window.electronAPI) window.electronAPI.updateMenuDifficulty('custom')
        setTimeout(fitWindow, 50)
      })

      overlay.querySelector('#custom-cancel').addEventListener('click', () => {
        document.body.removeChild(overlay)
      })

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) document.body.removeChild(overlay)
      })

      setTimeout(() => overlay.querySelector('#custom-rows').focus(), 50)
    }

    function showStatsDialog() {
      const s = stats.getSummary()
      function fmt(n) { return String(n).padStart(3, '0') }
      function fmtTime(t) { return t === null ? '--:--' : Math.floor(t / 60) + ':' + fmt(t % 60) }

      const overlay = document.createElement('div')
      overlay.className = 'dialog-overlay'
      overlay.innerHTML = `
        <div class="dialog" style="min-width:320px">
          <h2>游戏统计</h2>
          <p>总局数: ${s.totalGames}</p>
          <p>胜利: ${s.gamesWon} / 失败: ${s.gamesLost}</p>
          <p>胜率: ${s.winRate}%</p>
          <p>当前连胜: ${s.currentStreak}</p>
          <p>最长连胜: ${s.bestStreak}</p>
          <p>总游戏时间: ${fmtTime(s.totalPlayTime)}</p>
          <p style="margin-top:8px">最快完成:</p>
          <p>  初级: ${fmtTime(s.bestTime.beginner)}</p>
          <p>  中级: ${fmtTime(s.bestTime.intermediate)}</p>
          <p>  高级: ${fmtTime(s.bestTime.expert)}</p>
          <div class="actions">
            <button class="btn" id="stats-close">关闭</button>
          </div>
        </div>
      `
      document.body.appendChild(overlay)

      overlay.querySelector('#stats-close').addEventListener('click', () => {
        document.body.removeChild(overlay)
      })

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) document.body.removeChild(overlay)
      })
    }

    function showAboutDialog() {
      const overlay = document.createElement('div')
      overlay.className = 'dialog-overlay'
      overlay.innerHTML = `
        <div class="dialog" style="min-width:280px">
          <h2>关于扫雷</h2>
          <p>经典扫雷游戏 v1.1</p>
          <p style="margin-top:8px;font-size:12px">
            Electron 跨平台桌面应用<br>
            纯 JavaScript 实现<br>
            经典 WinXP 风格
          </p>
          <div class="actions">
            <button class="btn" id="about-close">关闭</button>
          </div>
        </div>
      `
      document.body.appendChild(overlay)

      overlay.querySelector('#about-close').addEventListener('click', () => {
        document.body.removeChild(overlay)
      })

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) document.body.removeChild(overlay)
      })
    }

    function showKeyBindingsDialog() {
      const overlay = document.createElement('div')
      overlay.className = 'dialog-overlay'

      const rows = Object.entries(bindings.getBindings()).map(([action, data]) => `
        <div class="bind-row">
          <span class="bind-label">${data.label}</span>
          <button class="bind-key" data-action="${action}">${bindings.getDisplayKey(action)}</button>
        </div>
      `).join('')

      overlay.innerHTML = `
        <div class="dialog" style="min-width:320px">
          <h2>键盘快捷键</h2>
          ${rows}
          <div class="actions" style="margin-top:8px">
            <button class="btn" id="bind-reset">恢复默认</button>
            <button class="btn" id="bind-close">关闭</button>
          </div>
        </div>
      `
      document.body.appendChild(overlay)

      document.getElementById('bind-close').addEventListener('click', () => {
        document.body.removeChild(overlay)
      })

      document.getElementById('bind-reset').addEventListener('click', () => {
        bindings.reset()
        bindings.save()
        overlay.querySelectorAll('.bind-key').forEach(btn => {
          btn.textContent = bindings.getDisplayKey(btn.dataset.action)
        })
      })

      overlay.querySelectorAll('.bind-key').forEach(btn => {
        btn.addEventListener('click', () => {
          if (listeningForBind) return
          listeningForBind = btn.dataset.action
          btn.classList.add('listening')
          btn.textContent = '按下新键...'
        })
      })

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) document.body.removeChild(overlay)
      })

      setTimeout(() => overlay.querySelector('#bind-close').focus(), 50)
    }

    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        ui.hideCursor()
        resetGame(btn.dataset.level)
      })
    })

    document.getElementById('face-button').addEventListener('click', () => {
      ui.hideCursor()
      resetGame(game.currentLevel)
    })

    const origReveal = game.reveal.bind(game)
    game.reveal = function(row, col) {
      const wasReady = this.state === 'ready'
      origReveal(row, col)
      if (wasReady && this.minesPlaced) startTimer()
      if (this.state === 'lost' || this.state === 'won') stopTimer()
      ui.render()
    }

    const origToggle = game.toggleFlag.bind(game)
    game.toggleFlag = function(row, col) {
      const wasReady = this.state === 'ready'
      origToggle(row, col)
      if (wasReady && this.state === 'playing') startTimer()
      if (this.state === 'won') stopTimer()
      ui.render()
    }

    let listeningForBind = null

    document.addEventListener('keydown', (e) => {
      const isTyping = ['INPUT', 'TEXTAREA'].includes(e.target.tagName)
      if (isTyping) return

      if (listeningForBind) {
        if (e.key === 'Escape') {
          listeningForBind = null
          document.querySelectorAll('.bind-key.listening').forEach(btn => {
            btn.classList.remove('listening')
            btn.textContent = bindings.getDisplayKey(btn.dataset.action)
          })
          return
        }
        const action = listeningForBind
        const conflict = bindings.findConflict(action, e.key)
        if (conflict) {
          alert(`"${bindings.getDisplayKey(action)}" 已被「${bindings.defaults[conflict].label}」占用`)
          listeningForBind = null
          document.querySelectorAll('.bind-key.listening').forEach(btn => {
            btn.classList.remove('listening')
            btn.textContent = bindings.getDisplayKey(btn.dataset.action)
          })
          return
        }
        bindings.setKey(action, e.key)
        listeningForBind = null
        document.querySelectorAll('.bind-key').forEach(btn => {
          btn.classList.remove('listening')
          btn.textContent = bindings.getDisplayKey(btn.dataset.action)
        })
        e.preventDefault()
        return
      }

      if (e.key === 'Escape') {
        const overlay = document.querySelector('.dialog-overlay')
        if (overlay) overlay.remove()
        return
      }

      if (document.getElementById('pause-overlay').classList.contains('visible')) return

      const { row, col } = ui.cursor
      if (row < 0 || row >= game.rows || col < 0 || col >= game.cols) return
      const action = bindings.getActionForKey(e.key)
      if (!action) return
      e.preventDefault()

      switch (action) {
        case 'moveUp':
          ui.setCursor(Math.max(0, row - 1), col)
          break
        case 'moveDown':
          ui.setCursor(Math.min(game.rows - 1, row + 1), col)
          break
        case 'moveLeft':
          ui.setCursor(row, Math.max(0, col - 1))
          break
        case 'moveRight':
          ui.setCursor(row, Math.min(game.cols - 1, col + 1))
          break
        case 'activate': {
          const cell = game.board[row]?.[col]
          if (cell && cell.revealed && cell.adjacentMines > 0) {
            ui.doChord(row, col)
          } else {
            ui.onLeftClick(row, col)
          }
          break
        }
        case 'flag':
          ui.onRightClick(row, col)
          break
        case 'newGame':
          resetGame(game.currentLevel)
          break
      }
    })

    function pauseGame() {
      if (game.state !== 'playing') return
      stopTimer()
      document.getElementById('pause-overlay').classList.add('visible')
    }

    function resumeGame() {
      document.getElementById('pause-overlay').classList.remove('visible')
      if (game.state === 'playing') startTimer()
    }

    window.addEventListener('blur', pauseGame)
    window.addEventListener('focus', resumeGame)

    function setMute(muted) {
      audio.enabled = !muted
      localStorage.setItem('minesweeper_muted', muted)
      if (window.electronAPI) window.electronAPI.updateMenuMute(muted)
    }

    if (window.electronAPI) {
      window.electronAPI.onMenuAction((data) => {
        switch (data.action) {
          case 'new-game':
            resetGame(game.currentLevel)
            break
          case 'difficulty':
            resetGame(data.level)
            break
          case 'custom':
            showCustomDialog()
            break
          case 'theme':
            ui.setTheme(data.value)
            break
          case 'toggle-mute':
            setMute(data.value)
            break
          case 'stats':
            showStatsDialog()
            break
          case 'about':
            showAboutDialog()
            break
          case 'keybindings':
            showKeyBindingsDialog()
            break
        }
      })
    }

    const savedTheme = localStorage.getItem('minesweeper_theme')
    if (savedTheme) {
      ui.setTheme(savedTheme)
      if (window.electronAPI) window.electronAPI.updateMenuTheme(savedTheme)
    }

    const savedMuted = localStorage.getItem('minesweeper_muted')
    if (savedMuted !== null) {
      setMute(savedMuted === 'true')
    }

    ui.render()
    setTimeout(fitWindow, 100)
  </script>
</body>
</html>
